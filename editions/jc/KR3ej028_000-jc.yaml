body:
  text: 初生小兒生下以甘草黃連馬料豆多煎湯與之服蓋穢吞胸中吐以甘草穢入腹中利以黃連也茯苓丸能治初生小兒腹滿氣短不能飲乳是穢物入腹所致若胎中受寒令小兒腹痛亦治茯苓丸赤茯苓黃連寒症不用宜用芍藥蜜丸桐子大乳汁下一丸沐浴宜益母草湯令兒體滑血脈流通免生瘡疾益母草黃連各一兩蛇床子苦參各二兩藁本五錢硃砂雄黃各一錢又方桃枝梓枝煎湯臨浴時加豬膽一個入內噤風噤風者初生七日內忽然目閉口噤啼聲不出下青糞舌上有胬肉如慄吃乳不得口吐白沫大小便皆通由在胎受熱毒流入心脾故見於喉舌之間或初生時為風邪搏擊所致名犯風噤口中白慄用綿裹指蘸水擦破百二十日內俱有此患一口噤不乳腹急多啼牙關緊閉與撮口相似赤者心噤白者肺噤撮口撮口者面目黃腫或赤喘急啼聲不出由胎受熱氣兼風熱入臍流毒於心脾故舌強唇青聚口撮而飲乳有妨若口吐白沫四肢冷不治或肚脹青筋吊腸卵疝內氣引痛皆腸胃鬱結所致十救二三月內尤急周歲始免用白殭蠶直而明亮者佳二條去絲嘴炙脆為末蜜調敷人中即瘥或研牛黃一錢和竹瀝抹口中亦治按牛黃要嫩黃輕虛重疊可揭氣息微香摩指甲竟透者臍風臍風者斷臍後水濕風冷入臍流於心肺甚則發搐成驚若臍凸四傍青黑撮口不開是為內撮爪黑者死用赤腳蜈蚣一條蠍尾四個殭蠶七條瞿麥五分為末先以鵝羽管吹鼻內得噴嚏啼哭為可治後用薄荷湯調服三者名雖不同其原則一皆因裡氣鬱結壅閉不通由斷臍太短結得不緊外風入臍或牽動臍帶水入生瘡所致撮口尤其治當疏利並用余家小紅丸下之後用抱龍丸牛黃丸等心熱發驚面青啼不出吐白沫腹脹硬臍四邊浮腫舌強不進乳不與噤風同初生小兒熱在胸膛頻頻作聲弩脹治法宜去風此症眉青臉赤勿用藥治兒口噤牙關閉者用天南星去皮臍為細末加龍腦少許和均指蘸薑汁同藥擦牙上小紅丸又名辰砂丸全蠍去毒洗淨一兩南星一兩珍珠一錢硃砂四錢五分巴霜二錢五分為末糯米糊丸如芥子大每歲三五丸看小兒強弱用十歲以外百丸方效燈心湯下須要活法加減用之方稱弄斧之手如六七十丸四五十丸在用之者才酌抱龍丸天竺黃一兩膽星四兩雄黃五錢蜜丸圓眼核大約重一錢硃砂為衣每服一丸薄荷湯化下辰砂為衣亦可牛黃丸枳實黃連各一兩膽星二兩天竺黃五錢天麻五錢殭蠶金蠍各三錢雄黃三錢龍齒煅三錢牛黃一錢麝香冰片各錢半蜜丸蠟封用則去蠟薄荷湯燈心湯化下氣閉兒生一二日大小便不通腹脹滿而欲絕此胎毒之氣鬱閉所致急令婦人溫水漱口吸兒前後心臍下及手足心共七處各吸五七口赤紅色為度氣散而自通不然救亦無用服余家小黑丸及蔥白散蔥白四寸人乳內同搗如泥敷入兒口與乳使吐後用當歸散當歸散當歸八分木通六分連翹五分滑石六分甘草梢三分水一鍾煎不時服小黑丸木香一兩五分丁香七錢五分肉蔻曲包煨十個杏仁去皮尖百二十粒百草霜一兩巴霜前藥每一兩加巴霜一錢丸法用法與小紅丸同躽啼兒生下身青白無血色日夜啼不止體仰而躽腹滿不乳大便青白是在胎為風冷所傷而然時時吐哯或腹中如雞子黃接之如小雞聲而後出若不急治則成癇宜用余家小黑丸及養臟湯養臟湯白朮八分芍藥六分茯神七分川芎五分藿香六分甘草四分木香三分鉤藤三分澤瀉肉豆蔻各七分水一鍾姜三片煎服傷風風邪感於腠理先入於肺肺主皮毛其身日夜發熱無汗鼻塞氣粗不惡寒而惡風當風乃憎寒呵欠煩悶口中氣熱當表散宜加減芎蘇飲芎蘇飲黃芩柴胡紫蘇前胡枳殼半夏桔梗防風山楂茯苓陳皮甘草乾葛頭痛加川芎或白芷偏身及肢節痛加羌活夾食去枳殼加青皮枳實或蒼朮四五日熱不退加麻黃服麻黃又不退熱入里也去紫蘇枳殼防風加枳實竹葉石膏用余家小紅丸下之有痰前飲內加貝母天花粉或膽星熱稍退而嗽前飲內去紫蘇防風加桑白皮杏仁或貝母先當用小紅丸下之嗽不轉者熱鬱在肺而氣不得宣通加麻黃石膏嗽甚見血加山梔石膏嗽久雖無血亦加山梔略有餘熱前飲內去紫蘇柴胡防風加石膏兒百日內身熱當用脫甲散四五日不止用小紅丸脫甲散銀柴胡龍膽草知母麻根各三錢川芎當歸各二錢茯苓人參各一錢甘草一錢蔥白頭一個煎服咳嗽咳嗽屬肺風熱鬱於肺則生痰故嗽有喉間作小雞聲者先用小紅丸下之不惟下痰且肺與大腸相為表裡腑不實臟不能實也大率順氣化痰清肺為主宜清金貝母湯清金貝母湯貝母杏仁桑皮花粉桔梗枳殼甘草黃芩木通蘇子陳皮茯苓痰甚加膽星食積痰去貝母加製半夏山楂痰而嗽甚加山梔喘加馬兜鈴或紫菀嗽而血加山梔石膏嗽而氣逆倍蘇子嗽不轉加麻黃石膏嗽久加款冬花馬兜鈴或瓜蔞仁紫菀五味烏梅食枳痰須用製半夏枳實青皮枳殼嗽甚眼白上有胬肉生者此嗽傷血分也宜服生地當歸入血分檳榔下其氣瘧瘧者有暑有痰有風有濕有食兒病多食風痰無汗要有汗散風邪為主大人兼補小兒不必宜清脾退熱飲清脾退熱飲柴胡黃芩枳殼半夏花粉青皮檳榔山楂常山草果茯苓陳皮甘草暑加香薷渴甚加石膏濕加蒼朮有汗要無汗扶正氣為主大人小兒俱帶發散用加減補中益氣湯補中益氣湯人參白朮黃耆柴胡歸身升麻黃芩陳皮茯苓加減法如前久瘧一補一瀉柴胡黃芩枳實半夏檳榔山楂白朮茯芩陳皮甘草瘧後寒熱雖停尚有餘熱宜清脾退熱飲去常山草果加地骨皮知母腹脹加桔梗卜子瘧母者寒熱時血氣與邪相爭飲冷所致結塊在脅下宜鱉甲丸阿魏丸等鱉甲丸生地當歸川芎紅花牡丹皮檳榔蓬朮香附厚朴鱉甲醋炙穿山甲尤妙阿魏丸阿魏沸湯泡雄黃研末各二錢半辰砂研末一錢半麵糊丸綠豆大胎瘧六七發過即宜截久則元氣虛久瘧成勞用四獸飲截瘧飲四獸飲常山三錢枳殼三錢檳榔一個生薑五片水煎五更服截瘧飲全歸三錢川芎三錢甘草三錢何首烏二兩新而大者佳陰陽水各一大碗煎一碗臨日面朝東五更溫服吐吐症有五一曰哯乳哺過多口角流出滿而溢也勿與乳則以陳米煮粥與食勿藥可也二曰逆上升為逆氣貴下降消食順氣為主三曰吐為頓出有物無聲以蒼朮藿香二陳湯等四曰嘔為漸出有物有聲亦用上方五曰噦即乾嘔也有聲無物乃屬火最為惡候生薑為嘔家聖藥若兒傷食為多不可與乳乳味甘令中滿且動舌筋起胃火初生小兒便吐由拭口中穢血不盡或食胞漿故令吐多用甘草黃連汁或吾家小黑丸不止服正胃散傷食吐冷吐可服溫胃調氣湯溫胃調氣湯蒼朮正胃氣厚朴泄中氣半夏香附正氣山楂神麯麥芽藿香正氣乾薑茯苓服此不止若見是冷可加木香丁香厚朴次第加之若是傷食以枳實青皮檳榔次第加之用前藥又不止是胃氣因吐而虛面青白唇淡精神少可加人參此症必眼眶陷下方可用參若不用參恐虛極生風傳為慢驚暑月有熱吐者因冒暑或傷熱食致熱氣入胃吐也食與氣相搏而吐也其症眼眶陷唇燥舌有刺大便焦黃射出如臭鴨蛋腥氣用水潑地令兒臥上用黃瓜同臥宜服清熱之劑如後吐瀉論中清胃止渴湯可加減用之初生小兒吐余家小黑丸最妙吐瀉脾胃俱虛吐瀉並作傷食為多四時俱有或有春因於風佐以防風天麻夏因於暑佐以香薷扁豆秋因於涼本方皆溫劑不必藥佐昏睡露睛胃家虛熱睡不露睛胃家實熱無論虛熱實熱先用小黑丸微利之亦有身大熱而吐瀉皆傷風症宜治風不因吐瀉而感之傷食吐瀉乳食不化或吐與瀉皆酸臭宜消食平胃湯消食平胃湯藿香厚朴蒼朮半夏香附陳皮山楂神麯茯苓瀉色黃赤屬熱加姜炒黃連青白屬冷只用本方甚則加木香丁香肉桂乾薑肉蔻等腹痛加砂仁身熱加柴胡傷食重枳實青皮檳榔可漸加身涼吐沫瀉青白呵欠煩悶不渴噦氣常見露睛此病久荏苒因成吐瀉急宜補脾量加人參白朮乾薑肉桂附子木香丁香等身熱或不熱眼眶陷舌上有刺唇燥飲水瀉焦黃臭清胃止渴湯清胃止渴湯人參蓮肉柴胡黃連杏仁陳皮甘草石膏山梔貝母茯苓若眼眶勿陷且勿用人參只用白朮眼眶已陷斷要用參腹痛加砂仁久渴而虛亦須加山藥白朮不止加肉蔻訶子冷瀉色青白面㿠白悽慘去黃連加附子木香蒼朮甚則丁香肉桂亦可用此症手足厥冷為逆急與人參附子溫其胃不變慢驚傷食瀉糞色白水穀不化酸臭去黃連加蒼朮香附瀉而浮腫小便澀少不行是小腸滲入脾胃宜利水湯利水湯蒼朮白朮也可滑石豬苓澤瀉厚朴陳皮甘草山楂茯苓皮赤芍藥車前子用升麻柴胡提其氣木香天麻醒其脾防風燥其濕上吐清汁下瀉完穀面白腹痛手麻腳轉筋大叫哭食乳即返此因濕痰流注四肢宜除濕化痰湯若唇口乾燥司空黃色勿用此方亦用利水湯加天麻小兒吐乳或痰瀉黃沫唇深紅額汗自時出若陰囊吊縮牙齦黑色女兒陰腫勿必用醫藥霍亂其症脈多伏或絕內有所積外有所感邪正相干陰陽乖隔留於中脘陽不升陰不降吐利暴作病在上焦心痛而吐病在下焦腹痛而瀉病在中焦心腹俱痛吐瀉並作偏陽多熱偏陰多寒甚則轉筋腹痛手足厥逆又足陽明胃經以養宗筋暴吐暴瀉宗筋失養故攣急甚則舌卷囊縮脾受賊邪木來侮土也吐瀉盡陰陽順而愈矣此症乃飲食所傷切勿與穀食姜椒等必待吐盡瀉盡過一二時方與稀粥若干霍亂最是急症不得吐利陰陽閉而死矣此乾霍亂乃立見安危惟用鹽水灌之令其大吐或掘地穴以新汲水投之攪取澄清飲之或用手挖喉中探吐尤捷有宜吐者雖已吐利仍用二陳湯吐之以提其氣又刺委中及十指出血凡霍亂用吐瀉本方因風加柴胡防風因寒倍半夏因濕倍蒼朮防風因暑加藿香扁豆因食多用枳實青皮治泄瀉用益元散加白朮末一兩每服一二錢米湯調服積積者停蓄之總名諸書皆分五積屬臟六聚屬腑腑病不治自愈臟病宜治而脾臟尤難丹溪只言積塊有形之物在左為血積在右為痰積在中為食積兒則有食積乳積氣積虛積實積驚積熱積寒積甚則為痃癖為痞結為癥瘕又肝積為肥氣脾積為痞氣肺積為息賁心積為伏梁腎積為奔豚治各不同小兒只是去脾家食積而已夫胃水穀之海脾即夾肝附上脾熱則磨速而食易化脾寒則磨遲而食難消不消則變為冷積矣大抵消食行氣開痰化血為主只宜消之化之磨之無下積之理若積瀉先當小黑丸下之後即宜補以人參白朮磨以檳榔枳實山稜蓬朮輩小兒只是食積多痰與血少其餘更少然食積為疳積之根未至疳時不可用胡黃連銀柴胡蘆薈等寒藥只宜溫和藥化之開之余家小黑丸可用若常服則用肥兒丸肥兒丸炒陳皮四兩厚朴米泔水浸炒麩炒枳實炒卜子炒青皮姜炒黃連白朮檳榔各二兩山楂炒神麯炒焦麥芽連翹龍膽草蓬朮各一兩半甘草一兩半米泔水浸炒香附四兩為末蜜丸圓眼大米湯化下若疳積加蘆薈胡黃連柴胡名玉疳深道丸又名蘆薈丸必夜間發熱骨瘦如柴者方可加兒有積滯面目黃腫夜間身熱肚熱尤甚腹痛覆臥或大便閉塞小便如油發黃泄瀉糞白酸臭吐逆宜化積健脾湯化積健脾湯又名消積化聚湯陳皮厚朴蒼朮半夏香附枳實青皮山楂檳榔茯苓甘草積甚加山稜蓬朮草果腹痛加砂仁木香積塊而瀉先用小黑丸後服本方去半夏檳榔加白朮白芍有痰去蒼朮加海石石鹼血積去厚朴蒼朮半夏加當歸梢桃仁紅花甚則穿山甲氣積倍香附加桔梗砂仁實熱加黃連冷加木香丁香虛冷或下後積不除加丁香肉蔻若瀉而至虛黃積去枳殼檳榔青皮白朮虛甚加人參小便不利而腫加澤瀉豬苓痃癖皆宜前方惟痞乃腹脹胸滿營衛不得流行宜小黑丸微利甚則備急丸後宜用白朮補或在皮裡膜外亦宜本方又用人參白朮藥間服癥則傷食得之宜消食用本方瘕則傷血得之宜破血是久積所致藥俱見前余家肥兒丸是消積藥輕則可服重則加山稜蓬朮然當詳其痰血而增入消積化聚丸山稜白朮黃連茯苓木香歸尾麥芽砂仁紅花麥冬枳殼青皮神麯柴胡蓬朮檳榔制香附桃仁鱉甲乾漆益智蜜丸米飲湯下三錢空心服痢痢古滯下也水穀為瀉下膿血為痢赤屬血自小腸來白屬氣自大腸來皆屬濕熱積者食積滯者氣滯物欲出而氣滯不出則下墜故先急後重河間論行血則便自安調氣則後重自除此法甚妙仲景率以承氣湯下之量病加減小兒先用小黑丸下之後用芩連芍藥湯仍看其血病氣病而為佐使不可用澀藥止之久而虛者方可芩連芍藥湯芍藥茯苓陳皮厚朴甘草黃連黃芩枳殼檳榔山楂木通有血加當歸或生地血紫加桃仁歸梢腹痛加砂仁甚則少加木香血痢不宜噤口加連肉或烏梅後重甚加升麻柴胡痢久亦加恐元氣下陷也痢下青草汁者風毒也加防風或乾葛腹痛甚加乳香沒藥亦治痰血痢久加地榆蒲黃腹痛肺金之氣鬱於大腸以苦參桔梗痢如豆汁濕甚也加防風九製蒼朮亦可滑石亦可能利濕小便少亦加之積盡用白朮健脾調理氣分發呃用柿蒂枇杷葉去毛蜜炙丁香久而虛者加訶子肉蔻力倦氣少惡食此挾虛也宜當歸身尾白朮陳皮虛極加人參補虛虛回而痢自止血痢久不止屬陰虜四物湯為主痢久不瘥脾氣下陷補中益氣湯倍升麻柴胡痢久不瘥後變為瘧身腫面黃腹痛或瀉臭水目無神用余家大黑丸木香餅相間服前方加人參白朮木香肉蔻煎服小兒七八歲下純血勿以食積治前方加當歸或生地地榆蒲黃醋炒荊芥烏梅等斂血血紫先用歸尾桃仁行之氣血俱虛神弱人參白朮當歸白芍茯神黃連服之並大黑丸及木香餅間服瘧變為痢邪自外而深入五臟此症難治噤口痢胃熱甚也用黃連一錢人參三分煎汁終日呷之如吐再吃一口下咽便有生意又用田螺搗碎次下麝香再搗合臍中縛緊引下其熱休息痢既息復作當以虛治下如塵腐者如屋漏水者下純血者大孔如竹筒者唇如硃紅者如魚腦色者身熱脈大者俱不治此論其大概耳大黑丸又名保和丸炒香附一兩炒厚朴醋炒青皮陳皮使君子檳榔醋炒三稜炒甘草各五錢炒神麯薑汁炒黃連炒麥芽土炒白朮醋炒蓬朮各一兩山楂一兩半蜜丸圓眼大每服一丸空心米湯送下木香餅木香五錢炒陳皮二兩炒神麯一兩炒麥芽一兩煨肉蔻一兩人參五錢厚朴五錢煨訶子肉炒扁豆各一兩炒甘草五錢蜜丸圓眼大每服一丸空心米飲下疳疳者干也脾胃津液乾涸而成又甘也恣食甘甜成積生蟲積者疳之母有而不治乃成疳候積久不除臟虛成疳又久病後不節飲食或瀉後脾虛積熱布五臟積濕生蟲亦成疳兒為五疳大人為五勞也勞瘵腎虛津髓枯竭疳症脾虛津液枯乾病久相傳五臟皆損疳病眼澀多因愛吃泥土生米桴炭等喜臥冷地身多疥癬下痢青白及沫血腹大青筋耳鼻口生瘡蟲痛叫哭發穗頭大項小腳手垂軃瘦瘠飲水筋痿骨重體骨如柴等皆內無津液脾胃受傷又大病後或吐或瀉後妄施吐下津液枯竭而得之有因熱症大汗大痢無禁胃中焦燥得之有因傷寒里症冷駛太過渴飲水漿變而成熱熱氣未散復於他染得之又有癖病寒邪熱脅下痛硬不漸消磨以硇砂巴豆峻攻津液暴傷得之者又有肝疳則膜遮睛當補肝心疳面頰赤壯熱脾疳體黃腹大好吃泥土肺疳氣喘口鼻生瘡此虛者當補其母腎疳體瘦生瘡疥筋疳瀉血瘦弱骨疳喜臥冷地肉疳目腫腹脹痢青色白色或沫漸瘦弱外症鼻下赤爛自搔鼻頭瘡不結痂繞目生瘡諸疳皆依本臟而補母則子自安積久生蟲皺眉多啼吐沫腹痛肚大青筋唇紫黑腸頭癢為蛔疳宜川楝鶴蝨等頭皮光急生瘡腦熱發穗多汗囟高為腦疳宜龍膽草苦楝皮蘆薈黃連青黛等心肺壅熱煩渴乳食少夜則渴止為渴疳宜龍膽草烏梅黃連等毛焦唇白額上青紋腹脹腸鳴泄下糟粕為疳瀉至於頻下惡物為疳痢宜白朮桔梗厚朴白芍等虛中有積肚脹頭面四肢皆腫痢下腥臭為疳腫宜蘆薈大腹皮卜子滑石車前子等潮熱五心煩熱盜汗喘嗽骨蒸枯悴為疳勞宜黃耆白芍川芎肉蔻生地人參白朮鱉甲等疳蟲上蝕齒齦口瘡出血齒色紫黑下蝕腸胃下痢肚爛濕癢生瘡齒屬腎腎虛熱疳氣直奔上焦名走馬疳初日息臭齒黑名崩砂甚則齦爛名潰糟熱血迸出名宣露更甚者牙落名腐根腐根雖活齒不生矣而況焉能活乎手足細項小骨高尻削體痿腹大臍突號哭胸陷是為丁奚虛熱食噦顱開骨槁如柴引飲蟲從口出日漸枯槁是為哺露又重於丁奚消疳蘆薈乾蟾五靈脂鱉甲化積枳實蓬朮青皮山楂三稜神麯麥芽健脾人參白朮厚朴香附清熱柴胡黃連胡黃連銀柴胡龍膽草地骨皮連翹青黛殺蟲雷丸蕪荑苦楝根鶴蝨使君子疳瀉木香肉蔻訶子砂仁五臟疳方雖見論中然亦當用前藥佐以五臟本藥不必拘安神地黃丸方也五臟本藥開後心疳茯神黃連遠志琥珀蘆薈鉤藤石菖蒲肝疳生地熟地青黛地骨皮龍膽草脾疳白朮陳皮黃連肺疳黃芩桔梗連翹天冬麥冬防風桑白皮腎疳熟地澤瀉山茱萸牡丹皮腫脹腫脹雖均由脾胃之傷而實有不同氣溢皮膚則為腫氣入於臟則為脹人身心肺為陽而在上肝腎為陰而居下脾胃為陰而居中為土經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾具坤靜之德而有乾健之運也故能使心肺陽降肝腎陰升天地交泰永無腫脹之病此症因內傷飲食外感風寒致傷脾胃十早則清濁相混隧道壅塞瘀郁成熱熱留已久氣化成濕濕熱相生遂成浮腫脹滿其為腫也有食積有水積有瀉痢日久脾虛有傷寒下早其為脹也有痰熱有疳氣有食積痞癖積腫在腰以上宜汗腰以下宜利小腸脹宜消導有分道有利小便酌其虛實寒熱而調治腫脹主方茯苓皮厚朴蒼朮半夏香附以上健脾枳實神麯山楂青皮以上治積卜子泄氣豬苓澤瀉利小便升麻柴胡升提氣食積腫加檳榔蓬朮麥芽山楂神麯先下水腫加木通車前子滑石小兒實食積水腫多耳傷寒下早先調脾胃期臟氣充實宜人參山藥薏苡仁久則肉蔻訶子寒則乾薑木香丁香熱則黃芩黃連佐本方本方仍去消食藥風邪入肺而氣不宣通肺葉脹亦能作腫以肺主皮毛故也先自眼下臥蠶腫起喘急宜小紅丸下之後用桑白皮桔梗杏仁天花粉黃芩貝母枳殼木通防風黃耆二分防風瀉肺實得黃耆而功益神故用耆脹乃痰熱不用本方宜半夏貝母膽星枳實消痰有風防風大腹皮蘇子卜子桔梗利氣豬苓澤瀉車前行水先服小紅丸食積先服小黑丸後用本方寒熱虛熱宜本方去蒼朮加炒黃芩黃連利水豬苓澤瀉木通赤芍車前滑石葶藶商陸木瓜補脾人參白朮山藥薏苡仁枳實厚朴消食枳實青皮檳榔蓬朮山楂麥芽神麯三稜分氣香附木香藿香泄氣大腹皮蘇子桔梗卜子肺脹桑白皮杏仁上身宜汗柴胡升麻乾葛下身宜利小便陽水宜黃芩黃連山梔連翹陰水宜丁香香附木香草果厚朴乾薑風雖勝濕宜防風羌活蓁艽椒目天麻又能健脾陷下升麻柴胡有痰宜利痰貝母半夏膽星海藻昆布內消丸治小兒五疳八痢消食化積除驚風外百病可服三稜蓬朮香附三味醋拌炒檳榔煨草果青皮枳殼枳實二味麩炒木香去核山楂炒神麯炒麥芽炒砂仁去白陳皮等分為丸砂糖湯調服辰砂丸又名大紅丸川貝母膽星天花粉桔梗苦杏仁枳殼黃芩各四兩前胡防風製半夏陳皮全蠍地骨皮山梔各三兩黃連元參各二兩痘痧年不用連梔此藥消痰解毒發散痘痧蜜丸約重一錢辰砂為衣每服一丸薄荷湯化下驚風驚風原是二症驚者急驚慢驚風者中臟中風此言風熱極生風也驚風本於心肝二臟肝風心火相煽發搐小兒脾胃弱肝易凌之引動肝風風主掣不得心火不能發搐兒有病氣血錯亂心神不寧引動心火火主驚不得肝風亦不發搐此心與肝相兼為驚風之源也有驚風痰熱四症然後有搐搦掣顫及引竄視之候入候理得驚風定隨便與下痰藥驚風不復復作矣驚風是總名急驚者驚風痰熱所致慢驚者久病所得久瀉成慢脾慢驚久吐成胃虛驚無陰因心經實熱而陰不能配陽盛陰虛之候慢驚無陽因脾土虛甚而陽不勝陰是陰盛陽虛之症急慢驚風虛熱寒實天淵迥隔急驚九生一死慢驚九死一生凡搐時不得擒捉風氣方盛若一拘持痰即流入脈絡矣多致手足拘牽與癇症同初有痰熱未成驚風先宜解利解用柴胡黃芩乾葛紫蘇枳殼防風天麻半夏等利用小紅丸如無虛症不得主用溫補雖熱甚不得便用龍腦麝香恐引驚入竅且傷真氣蓋溫則補邪香則敗真心驚大概過暖當風多食辛辣郁邪熱於心而傳於肝再受驚觸未發時夜臥不穩啼哭齧齒咬乳氣促痰喘鼻額有汗忽而悶絕目直視牙緊口噤手足掣此熱甚而然發則身熱面赤引飲口中氣熱二便黃赤眼上視連札項背強直痰涎潮響脈數可辨蓋心有熱肝有風心藏神肝藏魂風火相搏神魂易動故發急驚關格不通先用小紅丸下之或用觸鼻散與龍腦麝香開關又須茯苓木通利小便退熱治驚化痰驅風藥多寒涼概宜勿用若遇庸手無深病而攻之反致痰熱入經絡卻成驚癇重症宜定驚順氣清熱化痰為主柴胡平肝黃連瀉心枳實順氣消痰貝母瀉痰天麻治風陳皮瀉痰順氣防風治風蘇子順氣清熱黃芩黃連山梔龍膽草連翹犀角燈心寒水石消痰枳實膽星天花粉半夏天竺黃貝母牛黃珍珠治風羌活防風柴胡殭蠶天麻蟬脫治驚全蠍雄黃硃砂琥珀鉤藤開竅麝香石菖蒲龍腦用抱龍丸蘇合丸牛黃丸辰砂丸俱可驚風死症歌項軟多無力喉間似鋸牽面紅妝色見目睛杳無光魚口開粗氣腳冷直偏長齧衣胡亂咬瘀血瀉於腸睛開還又合渾身硬似僵十般驚後病休用更思量脈法急驚風關黑紋直者死慢驚氣關紫紋兩條傳至風關者死無此雖凶無妨慢驚慢脾慢驚因久病之後諸經已虛又過用涼劑致脾胃微弱四肢無力身體倦怠面㿠白眼不開似搐不搐時時瘈瘲精神昏慢唇口俱白脈或浮或沉身或溫或涼本無熱或壯熱本無痰而喉如拽鋸一團虛熱痰也脾胃虛弱土受虧而木來侮亦見驚搐諸症俱漸緩故名慢驚以怯弱之兒大病之後或外感風冷脾胃益虛風乘而入逐風不可驅驚不可只宜溫補無汗下之理若錯用下痰藥痰隨氣降氣隨痰絕矣溫補宜用茯苓陳皮天麻防風山藥扁豆白朮全蠍殭蠶白附子薑製半夏弱甚加人參不食加蓮肉寒甚加木香丁香縱急驚傳來用膽星化痰白朮調胃勿用涼藥慢脾驚多瀉而得胃虛驚久吐而成脾肺子母也脾胃一虛肺氣先病則先頑痰痰者肺內所流作小雞聲時後瘈瘲眼偏開由驚入也宜用人參白朮山藥肉蔻木香殭蠶全蠍天麻丁香白附子有痰加半夏膽星貝母甚者可用黑附子暑日熱甚吐瀉亦成慢驚病原藥具吐瀉門寒甚可加附子兒月內溫壯翻眼握拳噤口咬牙身腰強直涎潮嘔吐搐掣驚啼腮縮囟開或頰赤面青眼上視不可誤作慢驚脾風妄用溫藥要視其眉間紅赤鮮碧色者可用防風黃連枳實膽星全蠍天麻甚則牛黃丸小紅丸豬乳化結風毒驚癱鶴膝候四肢痿痹不伸脹痛不能忍者風毒之氣宜防風半夏枳殼羌活天麻在上用升麻桔梗在下用牛膝木瓜兒心悸不常及偏身腫痛或手足不隨為驚癱若治稍緩臂腕膝脛骨節之間流結項核或膝腫而肉消骨露如鶴膝狀並宜發汗使腠理開通則風熱可治而濕亦可去使風不生而痰不作莫作瘡癰論用黑牽牛半生熟為末加入五苓散內酒調服癇其症與驚風相似血滯心竅積驚成癇外症神氣怫鬱瞪目直視面目牽引口噤流涎腹脹手足抽掣似生似死或有聲無聲或背項反張或腰脊強直發而時醒者為癇若強硬終日不醒為痓痙矣要分陰陽先發熱驚掣啼叫為陽癇大便實小便赤脈浮病在脾在肌膚易治勿用溫藥反是病在臟在骨髓難治為陰癇勿用寒藥亦當於仰覆臥參看惟利驚卻風化痰為要有犬羊牛雞豬之異兒有熱痰一不飲乳眠睡不穩常時驚悸即用小紅丸減其盛氣為妙風癇者汗出解脫風乘虛入初屈指如數是有熱生痰驚癇者震駭恐怖或打墜積驚初時精神恍惚大叫食癇者食時得驚停宿結聚初時吐乳不食大便酸臭先寒後熱三者具用小紅丸下之後以膽星半夏神麯天麻防風枳實苦杏仁蘇子或葉陳皮全蠍青黛黃連殭蠶天竹黃白附子風癇加羌活蟬蛻獨活驚癇加遠志茯神石菖蒲食癇加青皮蘆薈癲癇狂痓四症皆始於心心者神明之舍常欲安靜內邪外熱脾胃虛而不能制腎水遂精神失守恍惚多驚四症作焉重陰則癲重陽則狂癇則身軟而醒痓則身強而溫癲則悲喜歌哭狂則譫語不食棄衣而走癇則臥地嚼舌吐沫或作諸獸聲痓則反弓痰壅皆風涎流滯心胞絡也失治則傷心心傷則神去而死宜清心消痰順氣為要貝母膽星紫蘇枳實陳皮黃連青黛遠志茯神半夏曲石菖蒲腹痛食積痛面黃腹脹夜熱日涼宜小黑丸甚則備急丸飲食乍傷脾而痛大便去而痛止亦宜用小黑丸備急丸下之食得寒則凝得熱則散更宜行氣有蟲宜追蟲散又有痰痛痰因氣聚而滯阻礙道路氣不通脈小便不利先宜小紅丸後服枳實朴硝石鹼半夏導痰開鬱若痛有常處而不移是死血宜歸尾桃仁蓬朮枳實青皮砂仁紅花腹鳴作痛是水欲下而火欲上宜二陳湯加黃連山梔臟寒有水而鳴宜分三陰部分中脘太陰臍腹少陰小腹厥陰兒只是傷食食積與蟲宜消食止痛開鬱行氣先用小黑丸備急尤妙後用本方消食止痛本方厚朴蒼朮製半夏香附枳實青皮陳皮檳榔砂仁山楂甘草茯苓痛甚加木香食積加蓬朮三稜傷食輕則本方去檳榔蟲加川楝鶴蝨痰去厚朴蒼朮加見論中死血用論中藥可加大黃水下火上本方去蒼朮檳榔加論中藥臟寒本方倍青皮枳實加木香丁香或厚朴乾薑熱痛不宜本方血虛腹痛白芍藥湯治蟲臟腑強盛諸蟲不為害惟虛怯則濕熱生蟲蟲行求食作痛上唇有瘡曰惑蟲蝕其臟下唇有瘡曰狐蟲下食其肛胃熱則蟲動動則往來上下心腹痛面㿠白叫哭仰體撲手心神悶亂吐涎沫或清水沉沉默默貫心者心痛甚死不貫心亦死上半月蟲頭向上可投藥易治下半月蟲頭向下難治若病急先以肥肉汁或糖蜜引轉其頭然後用追蟲末藥面黃上有白團印是蟲症好吃布是肺蟲吃桴炭是肝蟲吃鹽是腎蟲吃茶葉是心蟲吃酸物是膽蟲吃土是脾蟲各隨本臟施治脈當沉若弦今反洪大是蟲虛小者生緊急者死寸脈沉滑是寸白蟲陳皮半夏枳實青皮檳榔蓬朮鶴蝨蕪荑雷丸使君子川楝根以上蟲藥可選用心痛心屬少陰君火為臟腑之主精神之舍邪不能幹干之則傷心而神去必面目俱黑手足青至節為真心痛旦發夕死今之心痛乃胃氣當心作痛治之痛止若食後痛治法須分新久初起時明知受寒傷冷物可用溫散如草豆蔻枳殼枳實山梔等丹溪用麻桂若脈堅實用溫利藥如備急丸丹溪用陳氣湯稍久則成鬱熱若更用溫散寧無助火為痛乎古方多用山梔為主佐以薑汁痛無補法勿用人參白朮此症不過痰火與食積耳若大吐大瀉尤妙痛攻腰背發厥嘔吐諸藥不納者蛔蟲用鵝翎探出痰碗許而痛止總宜消其痰降其火新者溫散之降火消痰本方枳實枳殼山梔黃連川芎陳皮白桔梗花粉香附薑製半夏新者去黃連加麻黃厚朴痛甚加元明粉石膏火加青黛痰甚加海石膽星喜食熱物必有死血停胃口宜桃仁承氣湯下之一方元胡索一兩厚朴五錢滑石五錢紅花五錢歸梢五錢紅曲五錢桃仁三十粒研如泥蒸餅丸濕流胃脘作痛宜小胃丹有蟲攻心作痛論見蟲門寒邪客心胞絡作痛又有痞癖上攻心作痛為抱心順氣理中湯烏藥香附蒼朮甘草乾薑或用枳殼青皮木香蓬朮半夏或枳實亦可丹溪用草豆蔻寒熱俱宜治九種心痛石菖蒲赤芍木通五靈脂咽喉喉痹是風毒之氣客於喉間與血氣相結而成腫塞水漿不可下甚者膿潰名纏喉風毒攻心腹而死攻心則悶懊悶懊則死矣或為單雙乳蛾最為急症多屬痰熱先用吐法甚者針刺去毒血服甘桔湯甘桔湯甘草桔梗元參連翹防風荊芥暑小兒脾胃虛弱腠理開疏暑氣乘虛而入有似驚風者宜香薷飲黃連解毒湯俱可六一散調服脫肛夫肺與大腸為表裡肛者大腸之門肺經實熱則秘結不通肺若虛寒則腸頭出露有因瀉痢久脾土虛不能生肺金故肛門脫而不收宜補脾溫胃使金受母之益而氣實次則內投固腸之劑外用敷洗之藥敷肛散龍骨煅赤石脂煅訶子肉各三錢共為末每用四五分敷上每日敷三次即愈先用荊芥穗香附煎湯洗之又方五倍子灰鱉頭灰敷妙用淨舊鞋底烘熱托上熱小兒稟賦純陽血氣熱易生熱有五臟熱五心煩熱四肢壯熱痰涎壅盛目澀多渴若上衝咽喉則與氣血相搏結成喉閉宜涼膈散涼膈散山梔薄荷黃芩連翹元參桔梗陳皮花粉甘草石膏竹葉甚者朴硝大黃可加或止加大黃黃疸此皆濕熱蒸於脾胃如合面相似脾胃象土其色黃故發於外生下黃名胎疸母臟有熱熏蒸於胎故也若黃疸變黑疸難治治疸以利小便為主小便利則黃自退從食積來者亦可行方內加食積藥赤茯苓陳皮豬苓澤瀉木通茵陳黃芩黃連枳殼山梔山楂蒼朮重加大黃檳榔淋症附白尿諸淋皆腎虛所致心為火腎為水水火平永無此疾水火不平心火燥腎水腎虛小腸膀胱皆生熱故諸淋之症生淋有五有膏淋如脂膏浮於水上此腎虛不能制其肥液而不行也有熱淋下焦有熱熱傳於腎流入於胞其溺黃澀熱極或出鮮血莖中痛甚甚至令人悶亂遍身有汗而後流出治法並宜行滯氣利小便解邪熱平心火心清則小便自利而血不妄切不可用補藥氣得補而愈脹血得補而愈澀熱得補而愈盛愈痛也亦有腎虛受寒為冷淋其症先寒戰而後熱宜微溫五淋主方赤茯苓陳皮甘梢山梔化肺氣車前子木通蓮肉黃連塊滑石豬苓澤瀉瞿麥燈心升麻炒柴胡炒膏淋加黃柏冷淋加沉香木香熱淋宜本方加淡竹葉血淋加蒲黃地榆石淋加生淡竹葉利小便藥內少加升麻柴胡不然氣不行也兒溺白尿由飲食不節致傷脾胃胃中濁氣滲入於膀胱故清濁不分尿白如米泔也宜燥中宮之濕用厚朴蒼朮半夏枳實青皮山楂香附茯苓陳皮甘草亦有心膈伏熱者宜清心利水以黃連蓮肉茯苓甘草梢陳皮厚朴豬苓車前子滑石澤瀉燈心眼目赤腫暴眼赤腫此肝熱也初起必因風不可用寒涼之劑四五日方可用當先羌活柴胡散風后用當歸黃連等川芎當歸黃連山梔連翹防風元參陳皮羌活甘草赤芍龍膽草有醫加木賊決明蟬蛻蔓荊子痧疹痧疹腑病也發獨藏肺經雖是胎毒多帶時行大抵冬溫宜發痧與發痘相類痧則變多比痘尤重稍感寒或食生冷疹則隱於肌膚而喘遂致不救非若痘症有色可驗有朝數可據也發必身無毫縫紅腫方為發透不然而喘作矣其初發必極熱或寒熱兼發形類傷寒目淚咳嗽煩躁鼻流清涕以火照之隱隱於皮膚之中以手撲之磊磊於肌肉之內乍隱乍見隨出隨沒沒而復出現而復隱根窠若腫是兼癮也皮膚若赤是夾斑也錦紋明潤為順紫黑暗慘為逆若略現復隱此又逆之甚者也治宜微汗以疏其氣熱清利以泄其邪鼻衄則熱解肺開竅於鼻也泄瀉毒下肺與大腸為表裡也所畏乾熱不妨咽痛出太遲宜發表太密宜解毒衣被不宜過熱大忌清涼疹則隱矣方書用黃芩黃連人參謬矣余家治此名稱獨步舊用升麻湯當歸膩膈芍藥酸寒皆所不宜余家世用防風湯防風湯防風荊芥貝母鼠黏子桔梗枳殼乾葛地骨皮川芎木通天花粉未透用麻黃色太赤用連翹黃芩甚則用石膏山梔元參色白淡用當歸嗽甚用桑白皮杏仁或加麻黃始發而嗽肺氣泄也不治無妨疹後而嗽尤宜泄肺喘甚倍加杏仁麻黃蘇子或紫菀馬兜鈴款冬花甚則倍生甘草桔梗鼠黏子小便澀用黃芩山梔木通余家不拘時候專主前方稍加酒以助藥性人尤不知也或疹時而吐瀉大作發喘或身汗不止而喘黃耆與防風並用防風瀉肺實得黃耆而功益神效也前此症發一周時今有十日半月者必眼紅腳底赤方為發透不然則為凶症出用溫和透用清涼不易之定論也亦必盡退方免後患痧疹後四危症其一肌膚壯熱是毒入諸臟肉消骨立發枯膚悴此名痧疳十難救一用黃芩黃連山梔龍膽草蘆薈當歸鬱金乾蟾頭甚則用銀柴胡胡黃連余家肥兒丸用之頗效又名蘆薈丸其一咳嗽胸高氣喘是毒留肺經或不禁酸寒所致用葶藶杏仁天冬麥冬石膏知母蘇子馬兜鈴如面青聲嘎不治一其走馬牙疳口齒生瘡臭爛若黑色如老醬畫碎無血出與走入咽喉者不治一其痧痢赤白治如痢法加防風連翹赤痢用扁豆柏葉荊芥穗樗皮滑石又外用芫荽煮酒苧麻和酒遍身括之令毛孔開疹易透也凡痧不得透用綿紗煮濃湯飲之立透又有一種疑痧世人不知兒生月內外斑駁如疹而不咳嗽此是胎中受熱血氣熱凝一吃後天乳汁氣衝而血未和乃有此症切莫認為痧子余家遇此亦移是疹乃遷就之說也凡疹方出已出俱忌豬肉胡桃荸薺橘子一切生冷之物已出後又忌雞魚鹽酸辛辣食雞令再出食鹽酸令咳嗽不止食五辛令生驚得此訣者識之
